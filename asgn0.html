<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Draw a blue rectangle (canvas version)</title>
  </head>

  <body onload="main()">
    <canvas id="example" width="400" height="400">
      Please use a browser that supports "canvas"
    </canvas>
	<form action="/process-data" method="POST">
		<label for="x">v1: x</label>
		<input type="number" id="x" name="button1" step="any">
		<label for="y">y</label>
		<input type="number" id="y" name="button1" step="any">
		<input type="button" id="button" value="Draw">
		<input type="button" id="button2" value="Draw">
		<label for="x2">v2: x</label>
		<input type="number" id="x2" name="button1" step="any">
		<label for="y1">y</label>
		<input type="number" id="y2" name="button1" step="any">
		<label for="selector">Operation: </label>
		<select name="cars" id="selector">
			<option value="addition">addition</option>
			<option value="subtraction">subtraction</option>
			<option value="multiplication">multiplication</option>
			<option value="division">division</option>
			<option value="magnitude">magnitude</option>
			<option value="normalize">normalize</option>
			<option value="Angle between">Angle between</option>
			<option value="Area">Area</option>
		</select>
		<label for="scalar">scalar: </label>
		<input type="number" id="scalar" name="button1" step="any">
	</form>
	<script src="lib/cuon-matrix-cse160.js"></script>
    <script src="asgn0.js"></script>
  </body>
</html>
